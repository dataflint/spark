name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [temurin@17]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Java 17: required to run pluginspark4 tests against Spark 4.0.1 (Spark 4 needs ≥17).
      # Spark 3.5 also supports Java 17, so pluginspark3 tests run on the same JVM.
      # Scala 2.12/2.13 still emit Java 8 bytecode by default, so the produced jars stay
      # compatible with Java 8 runtimes.
      - name: Setup Java (temurin@17)
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: spark-ui/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('spark-ui/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./spark-ui

      - name: Run frontend unit tests
        run: npm run test
        working-directory: ./spark-ui

      - name: Build and test plugin
        run: sbt +test
        working-directory: ./spark-plugin

