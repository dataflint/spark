name: CD
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - official

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: spark-ui/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('spark-ui/package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./spark-ui

      - name: Check branch for official release
        if: github.event.inputs.release_type == 'official' && github.ref != 'refs/heads/main'
        run: |
          echo "Official releases must be triggered from main, not $GITHUB_REF"
          exit 1

      - name: Create release tag
        id: create-tag
        if: github.event.inputs.release_type == 'official'
        run: |
          VERSION=$(grep 'lazy val versionNum' build.sbt | grep -oE '"[0-9.]+"' | tr -d '"')
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag v${VERSION}
          git push origin v${VERSION}
          echo "IS_RELEASE=true" >> $GITHUB_ENV
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
        working-directory: ./spark-plugin

      - name: Import GPG key
        if: github.event.inputs.release_type == 'official'
        run: echo "$PGP_SECRET" | base64 --decode | gpg --import --no-tty --batch --yes
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}

      - name: build frontend
        run: npm run deploy
        working-directory: ./spark-ui

      - name: package plugin
        run: sbt package
        working-directory: ./spark-plugin

      - name: publish to maven staging
        run: |
          if [[ "$IS_RELEASE" == "true" ]]; then
            export GITHUB_REF="refs/tags/${{ steps.create-tag.outputs.tag }}"
          fi
          sbt ci-release
        working-directory: ./spark-plugin
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

      - name: Verify artifact published
        run: |
          VERSION=$(grep 'lazy val versionNum' build.sbt | grep -oE '"[0-9.]+"' | tr -d '"')
          if [[ "$IS_RELEASE" == "true" ]]; then
            URL="https://repo1.maven.org/maven2/io/dataflint/spark_2.12/${VERSION}/spark_2.12-${VERSION}.pom"
            AUTH_ARGS=""
            EXPECTED_VERSION="${VERSION}"
          else
            URL="https://central.sonatype.com/repository/maven-snapshots/io/dataflint/spark_2.12/maven-metadata.xml"
            AUTH_ARGS="-u ${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}"
            EXPECTED_VERSION="${VERSION}-SNAPSHOT"
          fi
          echo "Verifying $EXPECTED_VERSION at: $URL"
          sleep 15
          for i in $(seq 1 10); do
            if curl -sf $AUTH_ARGS "$URL" | grep -q "${EXPECTED_VERSION}"; then
              echo "Artifact published successfully"
              exit 0
            fi
            echo "Attempt $i/10 — waiting 30s..."
            sleep 30
          done
          echo "Artifact not found after 5 minutes"
          exit 1
        working-directory: ./spark-plugin
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Changelog
        uses: scottbrenner/generate-changelog-action@master
        if: github.event.inputs.release_type == 'official' || startsWith(github.ref, 'refs/tags/v')
        id: Changelog
        env:
          REPO: ${{ github.repository }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        if: github.event.inputs.release_type == 'official' || startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create-tag.outputs.tag || github.ref }}
          release_name: Release ${{ steps.create-tag.outputs.tag || github.ref_name }}
          body: |
            See: https://dataflint.gitbook.io/dataflint-for-spark/overview/release-notes#version-${{ steps.create-tag.outputs.tag || github.ref_name }}

            commits change log:
            ${{ steps.Changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Bump version
        if: github.event.inputs.release_type == 'official' || startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(grep 'lazy val versionNum' build.sbt | grep -oE '"[0-9.]+"' | tr -d '"')
          NEW_VERSION=$(echo $VERSION | awk -F. '{$NF=$NF+1; print}' OFS='.')
          sed -i "s/lazy val versionNum: String = \"${VERSION}\"/lazy val versionNum: String = \"${NEW_VERSION}\"/" build.sbt
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${NEW_VERSION}\"/" ../spark-ui/package.json
          sed -i "s/${VERSION}/${NEW_VERSION}/g" clean-and-setup.sh
          sed -i "s/${VERSION}/${NEW_VERSION}/g" pyspark-testing/dataflint_pyspark_example.py
          sed -i "s/${VERSION}/${NEW_VERSION}/g" pyspark-testing/dataflint_pyspark_example_test.py
          sed -i "s/${VERSION}/${NEW_VERSION}/g" pyspark-testing/README.md
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add build.sbt ../spark-ui/package.json clean-and-setup.sh pyspark-testing/
          git commit -m "version bump to ${NEW_VERSION}"
          git push origin HEAD:main
        working-directory: ./spark-plugin