name: CD
on:
  workflow_dispatch: # manual trigger only — auto CD on main push is disabled
jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch'}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spark-ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./spark-ui
  
      - name: build frontend
        run: npm run deploy
        working-directory: ./spark-ui

      - name: package plugin
        run: sbt package
        working-directory: ./spark-plugin

      - name: publish to maven staging
        run: sbt ci-release
        working-directory: ./spark-plugin
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
  
      - name: Verify artifact published
        run: |
          VERSION=$(grep 'lazy val versionNum' build.sbt | grep -oE '"[0-9.]+"' | tr -d '"')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            URL="https://repo1.maven.org/maven2/io/dataflint/spark_2.12/${VERSION}/spark_2.12-${VERSION}.pom"
            AUTH_ARGS=""
          else
            # Check artifact-level maven-metadata.xml (no version in path) — updates immediately on publish
            URL="https://central.sonatype.com/repository/maven-snapshots/io/dataflint/spark_2.12/maven-metadata.xml"
            AUTH_ARGS="-u ${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}"
          fi
          EXPECTED_VERSION=$(if [[ "$GITHUB_REF" == refs/tags/v* ]]; then echo "${VERSION}"; else echo "${VERSION}-SNAPSHOT"; fi)
          echo "Verifying $EXPECTED_VERSION at: $URL"
          sleep 15
          for i in $(seq 1 10); do
            if curl -sf $AUTH_ARGS "$URL" | grep -q "${EXPECTED_VERSION}"; then
              echo "Artifact published successfully"
              exit 0
            fi
            echo "Attempt $i/10 — waiting 30s..."
            sleep 30
          done
          echo "Artifact not found after 5 minutes"
          exit 1
        working-directory: ./spark-plugin
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Changelog
        uses: scottbrenner/generate-changelog-action@master
        if: startsWith(github.ref, 'refs/tags/v')
        id: Changelog
        env:
          REPO: ${{ github.repository }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            See: https://dataflint.gitbook.io/dataflint-for-spark/overview/release-notes#version-${{ github.ref_name }}

            commits change log:
            ${{ steps.Changelog.outputs.changelog }}
          draft: false
          prerelease: false
