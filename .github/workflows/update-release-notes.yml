name: Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update (e.g. v0.8.7)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update release notes
        run: |
          gh release edit "${{ github.event.inputs.tag }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}