name: Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update (e.g. v0.8.7)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update release notes
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          VERSION="${TAG#v}"
          gh release create "$TAG" --title "Version $VERSION" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}