services:
  spark-history-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION:-3.5.1}
        SCALA_VERSION: ${SCALA_VERSION:-2.12}
        DATAFLINT_VERSION: ${DATAFLINT_VERSION:-0.8.3}
        USE_LOCAL_JAR: ${USE_LOCAL_JAR:-true}
        ICEBERG_VERSION: ${ICEBERG_VERSION:-1.7.1}
        BIGQUERY_VERSION: ${BIGQUERY_VERSION:-0.42.0}
    image: dataflint-history-server:${SPARK_VERSION:-3.5.1}
    container_name: dataflint-history-server
    ports:
      - "${HISTORY_SERVER_PORT:-18080}:18080"
    volumes:
      - ${SPARK_HISTORY_DIR:-./spark-events}:/spark-history:ro
#      - ./log4j2-debug.properties:/opt/spark/conf/log4j2-debug.properties:ro
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_LOG_LEVEL=INFO
      # Patch Spark bug with BigQuery/custom DataSource V2 metric types ("unexpected metrics type: value").
      # Requires rebuilding the JAR with the patched DataFlintHistoryServerPlugin.
      - DATAFLINT_PATCH_SQL_METRICS=${DATAFLINT_PATCH_SQL_METRICS:-false}
#      - SPARK_HISTORY_OPTS=-Dlog4j2.configurationFile=/opt/spark/conf/log4j2-debug.properties
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s